spring.application.name=mission0220

#Database
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/mission_db?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Hong1221##


#enable jdbc log
logging.level.org.springframework.jdbc=debug

#스키마 자동 생성 전략: 기존 데이터 보존 (필요 시 수동으로만 삭제)
spring.jpa.hibernate.ddl-auto=update

#실제 날아가는 SQL 확인 (디버깅용)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# 콘솔 입력 사용 시 DevTools 재시작으로 stdin이 끊기는 문제 방지
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false
