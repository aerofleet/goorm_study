<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Main</title>
</head>
<body>
	<h1>메인</h1>

	<div sec:authorize="isAnonymous()">
		<p>로그인 하세요.</p>
		<a th:href="@{/login}">Go to Login</a>
	</div>

	<div sec:authorize="isAuthenticated()">
		<p>
			환영합니다,
			<span th:text="${#authentication.principal instanceof T(com.mission.m260303.security.CustomUserDetails) ? #authentication.principal.displayName : #authentication.name}"></span>님.
		</p>
		<form th:action="@{/logout}" method="post">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
			<button type="submit">Logout</button>
		</form>
	</div>

	<h2>Pages</h2>
	<ul>
		<li><a th:href="@{/product/list}">제품 목록 (All users)</a></li>
		<li sec:authorize="hasAnyRole('MANAGER','ADMIN')">
			<a th:href="@{/product/add}">제품 입력 (Manager/Admin)</a>
		</li>
		<li sec:authorize="hasRole('ADMIN')">
			<a th:href="@{/product/userlist}">회원 목록 (Admin)</a>
		</li>
		<li sec:authorize="isAuthenticated()">
			<a th:href="@{/product/detail}">회원 상세 (Authorized)</a>
		</li>
	</ul>
</body>
</html>
